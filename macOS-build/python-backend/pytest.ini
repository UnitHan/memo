[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --cov=gemini_corrector
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=50

[coverage:run]
source = .
omit = 
    test_*.py
    */__pycache__/*
    */venv/*
    */build/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    if __name__ == .__main__.
    if __name__ == "__main__":
    raise AssertionError
    raise NotImplementedError
    if TYPE_CHECKING:
    @abstractmethod
